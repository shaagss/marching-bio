<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User's Marching Bio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
         <img src="https://semantic-web.com/wp-content/uploads/underpin-pan-european-data-space-for-holistic-asset-management-in-critical-manufacturing-industries-3.png" alt="marching bio logo">
    </header>

    <main>
        <div class="userCard">
            <h1>User's name</h1>
            <img src="https://img.magnific.com/free-vector/yellow-drum-illustration_24908-81974.jpg" alt="User's profile picture">
            <h2>Current group</h2>
        </div>
        <!-- start with just DCI -->
        <div class="historyCard">
            <h1>History</h1>
            <p>---2026---</p>
            <ul>
                <li>Redcoats</li>
                <li>Redcoats</li>
                <li>...</li>
                <li>Green Devils B</li>
            </ul>
            <p>---2021---</p>
        </div>
    </main>

    <footer>
        <p>Make your own <a href="https://marching.bio">marching bio</a></p>
    </footer>

    
</body>
</html>
