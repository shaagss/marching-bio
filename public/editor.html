<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit bio</title>

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <!-- stylesheets -->
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="editor.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css">

</head>
<body class="work-sans" hidden>
    <h1></h1>
    <p id="email"></p>

    <div class="page-divider">
        <div id="editor" class="invisible">
            <form id="filter-groups">
                <fieldset>
                    <legend id="circuit-legend">Circuit</legend>
                    <div class="options">
                        <label><input type="radio" name="circuit" value="DCI"> DCI</label>
                        <label><input type="radio" name="circuit" value="WGI"> WGI</label>
                    </div>
                </fieldset>
                <fieldset id="instrument-section" hidden>
                    <legend>Instrument</legend>
                    <div class="options">
                        <label><input type="radio" name="instrument" value="guard"> Guard</label>
                        <label><input type="radio" name="instrument" value="percussion"> Percussion</label>
                        <label><input type="radio" name="instrument" value="winds"> Winds</label>
                    </div>
                </fieldset>
                <fieldset id="class-section" hidden>
                    <legend>Class</legend>
                    <div class="options">
                        <label><input type="radio" name="class" value="World"> World</label>
                        <label><input type="radio" name="class" value="Open"> Open</label>
                        <label><input type="radio" name="class" value="All-Age"> All-Age</label>
                        <label><input type="radio" name="class" value="International"> International</label>
                        <label><input type="radio" name="class" value="A"> A</label>
                    </div>
                </fieldset>
            </form>
            <form id="add-exp">
                <fieldset>
                    <legend id="select-label">Corps</legend>
                    <div class="options">
                        <label for="group-select" hidden>Corps</label><br>
                        <select required id="group-select" class="work-sans"></select><br><br>
                        <div class="centered">
                            <label for="year-marched">Year marched:</label>
                            <input disabled required id="year-marched" class="work-sans" name="year-marched" type="number" placeholder="1972"><br><br>
                            <!-- key to prevent beta abuse -->
                            <label for="key">Key:</label><br>
                            <input required type="password" id="key" name="key"><br><br>
                            <input disabled id="exp-submit" type="submit" value="Submit">
                        </div>
                    </div>
                </fieldset>
            </form>
            <p id="conf"></p>
        </div>

        <div id="preview">
            <h1>preview here</h1>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
    <script src="editor.js"></script>
</body>
</html>
