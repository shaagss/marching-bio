<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor</title>

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <!-- stylesheets -->
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="editor.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css">

</head>
<body>
    <h1>heres the list i hope</h1>

    <form id="filter-groups">
        <label for="dci">DCI</label>
        <input required type="radio" id="dci" name="circuit" value="DCI">
        <label for="wgi">WGI</label>
        <input type="radio" id="wgi" name="circuit" value="WGI"><br><br>

        <label for="world">World</label>
        <input required type="radio" id="world" name="class" value="World">
        <label for="open">Open</label>
        <input type="radio" id="open" name="class" value="Open"><br><br>
    </form>
    <hr><br>
    <form id="add-exp">
        <label for="group-select">Group:</label><br>
        <select id="group-select" class="work-sans"></select><br><br>

        <label for="year-marched">Year marched:</label><br>
        <input id="year-marched" name="year-marched" type="number"><br><br>

        <!-- key to prevent beta abuse -->
        <label for="key">Key:</label><br>
        <input required type="password" id="key" name="key"><br><br>

        <input type="submit" value="Submit">
    </form>
    <p id="conf"></p>
    
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
    <script src="editor.js" ></script>
</body>
</html>
