<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit bio</title>

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <!-- stylesheets -->
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="editor.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css">

</head>
<body class="work-sans">
    <h1></h1>
    <p id="email"></p>

    <div id="editor" hidden>
    <h1>heres the list i hope</h1>

    <form id="filter-groups">
        <fieldset>
            <legend>Circuit</legend>
            <label><input type="radio" name="circuit" value="DCI"> DCI</label>
            <label><input type="radio" name="circuit" value="WGI"> WGI</label>
        </fieldset>

        <fieldset id="instrument-section" hidden>
            <legend>Instrument</legend>
            <label><input type="radio" name="instrument" value="guard"> Guard</label>
            <label><input type="radio" name="instrument" value="percussion"> Percussion</label>
            <label><input type="radio" name="instrument" value="winds"> Winds</label>
        </fieldset>

        <fieldset id="class-section" hidden>
            <legend>Class</legend>
            <label><input type="radio" name="class" value="World"> World</label>
            <label><input type="radio" name="class" value="Open"> Open</label>
            <label><input type="radio" name="class" value="All-Age"> All-Age</label>
            <label><input type="radio" name="class" value="International"> International</label>
            <label><input type="radio" name="class" value="A"> A</label>
        </fieldset>
    </form>
    <form id="add-exp">
        <label for="group-select">Group:</label><br>
        <select id="group-select" class="work-sans"></select><br><br>

        <label for="year-marched">Year marched:</label><br>
        <input id="year-marched" name="year-marched" type="number"><br><br>

        <!-- key to prevent beta abuse -->
        <label for="key">Key:</label><br>
        <input required type="password" id="key" name="key"><br><br>

        <input type="submit" value="Submit">
    </form>
    <p id="conf"></p>
    
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
    <script src="editor.js"></script>
</body>
</html>
